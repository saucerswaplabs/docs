<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 420" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="SAUCE revenue sources compounding into the Infinity Pool and raising the xSAUCE conversion rate">
  <rect x="0" y="0" width="940" height="420" rx="16" fill="#0A0A0B"/>
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A1A1AA"/>
    </marker>
  </defs>

  <!-- Revenue sources (left column) -->
  <g>
    <rect x="20" y="40" width="240" height="76" rx="12" fill="none" stroke="#2D2D33" stroke-width="1.5"/>
    <circle cx="44" cy="68" r="5" fill="#44E760"/>
    <text x="59" y="73" fill="#FFFFFF" font-size="15" font-weight="600">Trading fees</text>
    <text x="44" y="100" fill="#A1A1AA" font-size="12.5">protocol fee share funds buybacks</text>
  </g>
  <g>
    <rect x="20" y="152" width="240" height="76" rx="12" fill="none" stroke="#2D2D33" stroke-width="1.5"/>
    <circle cx="44" cy="180" r="5" fill="#7B96FF"/>
    <text x="59" y="185" fill="#FFFFFF" font-size="15" font-weight="600">Farm emissions</text>
    <text x="44" y="212" fill="#A1A1AA" font-size="12.5">staking share of the devcut</text>
  </g>
  <g>
    <rect x="20" y="264" width="240" height="76" rx="12" fill="none" stroke="#2D2D33" stroke-width="1.5"/>
    <circle cx="44" cy="292" r="5" fill="#D6C9FF"/>
    <text x="59" y="297" fill="#FFFFFF" font-size="15" font-weight="600">HBAR staking rewards</text>
    <text x="44" y="324" fill="#A1A1AA" font-size="12.5">swapped to SAUCE via daily buyback</text>
  </g>

  <path d="M 260 78 L 310 78 L 310 168 L 348 168" fill="none" stroke="#2D2D33" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <path d="M 260 190 L 348 190" fill="none" stroke="#2D2D33" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <path d="M 260 302 L 310 302 L 310 212 L 348 212" fill="none" stroke="#2D2D33" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <text x="304" y="148" fill="#A1A1AA" font-size="12.5" text-anchor="middle">SAUCE</text>

  <!-- Infinity Pool (center) -->
  <g>
    <rect x="350" y="118" width="230" height="150" rx="14" fill="none" stroke="#44E760" stroke-width="1.5"/>
    <text x="465" y="152" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="600">Infinity Pool</text>
    <text x="465" y="180" text-anchor="middle" fill="#A1A1AA" font-size="13">SAUCE reserve grows as</text>
    <text x="465" y="200" text-anchor="middle" fill="#A1A1AA" font-size="13">revenue compounds in</text>
    <text x="465" y="238" text-anchor="middle" fill="#44E760" font-size="13.5" font-weight="600">SAUCE per xSAUCE rate rises</text>
  </g>

  <!-- Staker (right) -->
  <g>
    <rect x="730" y="118" width="190" height="150" rx="14" fill="none" stroke="#2D2D33" stroke-width="1.5"/>
    <text x="825" y="152" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="600">Staker</text>
    <text x="825" y="180" text-anchor="middle" fill="#A1A1AA" font-size="13">holds xSAUCE; rewards</text>
    <text x="825" y="200" text-anchor="middle" fill="#A1A1AA" font-size="13">accrue in the rate itself,</text>
    <text x="825" y="220" text-anchor="middle" fill="#A1A1AA" font-size="13">nothing to claim</text>
  </g>

  <!-- Stake / unstake arrows -->
  <path d="M 730 152 L 590 152" fill="none" stroke="#2D2D33" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <text x="660" y="140" text-anchor="middle" fill="#FFFFFF" font-size="12.5">stake SAUCE</text>
  <path d="M 590 196 L 730 196" fill="none" stroke="#2D2D33" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <text x="660" y="184" text-anchor="middle" fill="#FFFFFF" font-size="12.5">mint xSAUCE</text>
  <path d="M 590 240 L 730 240" fill="none" stroke="#2D2D33" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow4)"/>
  <text x="660" y="260" text-anchor="middle" fill="#A1A1AA" font-size="12.5">unstake: xSAUCE</text>
  <text x="660" y="276" text-anchor="middle" fill="#A1A1AA" font-size="12.5">back to SAUCE</text>

  <text x="20" y="388" fill="#A1A1AA" font-size="13">The conversion rate started at 1:1 and only rises; new stakers enter at the current rate and never dilute existing ones.</text>
</svg>
